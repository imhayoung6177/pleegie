spring:
  application:
    name: pleegie

  datasource:
    url: jdbc:mysql://localhost:3306/pleegie?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ✅ 중복되었던 profiles 설정을 하나로 합치고 위치를 최상단으로 올렸습니다.
  profiles:
    include: secret

  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# 프로젝트 외부 경로 설정 (들여쓰기 없음)
uploadPath: c:/upload/